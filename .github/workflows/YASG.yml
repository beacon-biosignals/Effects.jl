name: YASG-enforcer
on:
  push:
    branches:
      - 'main'
    tags: '*'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # note: keep in sync with `format/run.jl`
    paths:
      - 'src/**'
      - 'test/**'
      - 'docs/**'
      - 'ext/**'
      - '.github/workflows/YASG.yml'
      - 'format/**'
jobs:
  format-check:
    name: YASG Enforcement (Julia ${{ matrix.julia-version }})
    # Run on push's or non-draft PRs
    if: (github.event_name == 'push') || (github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        julia-version: [1.9]
    steps:
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32  # v3.0.2
        with:
          version: ${{ matrix.julia-version }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Cache
        uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3.1.0
        with:
            cache-compiled: "true"
      - name: Instantiate `format` environment and format
        run: |
          julia --project=format -O0 -e 'using Pkg; Pkg.instantiate()'
          julia --project=format -O0 'format/run.jl'
      - uses: reviewdog/action-suggester@aa38384ceb608d00f84b4690cacc83a5aba307ff # v1
        if: github.event_name == 'pull_request'
        with:
          tool_name: JuliaFormatter
          fail_level: error
